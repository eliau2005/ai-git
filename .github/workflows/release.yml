name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, i.e. v1.0.0, v2.1.3

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Binaries
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 go build -o dist/ai-git-windows-amd64.exe ./cmd/ai-git
          GOOS=linux GOARCH=amd64 go build -o dist/ai-git-linux-amd64 ./cmd/ai-git
          GOOS=darwin GOARCH=amd64 go build -o dist/ai-git-darwin-amd64 ./cmd/ai-git
          GOOS=darwin GOARCH=arm64 go build -o dist/ai-git-darwin-arm64 ./cmd/ai-git

      - name: Generate Release Notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"* %s (%h)" > dist/changelog.txt
          else
            git log ${PREV_TAG}..HEAD --pretty=format:"* %s (%h)" > dist/changelog.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/changelog.txt
          files: |
            dist/ai-git-windows-amd64.exe
            dist/ai-git-linux-amd64
            dist/ai-git-darwin-amd64
            dist/ai-git-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
